openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Quest Start My Day
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: areas
    description: Project area operations
  - name: milestones
    description: Area milestone operations
  - name: tasks
    description: Daily task operations
  - name: weekly
    description: Weekly planning operations
  - name: progress
    description: Progress log operations
  - name: dashboard
    description: Dashboard summary operations
  - name: monthly
    description: Monthly review operations
  - name: daily
    description: Daily planning operations
  - name: reflections
    description: Reflection draft operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /areas:
    get:
      operationId: listAreas
      tags: [areas]
      summary: List all project areas
      responses:
        "200":
          description: List of areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Area"
    post:
      operationId: createArea
      tags: [areas]
      summary: Create a new area
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAreaBody"
      responses:
        "201":
          description: Created area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Area"

  /areas/{id}:
    patch:
      operationId: updateArea
      tags: [areas]
      summary: Update a area
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAreaBody"
      responses:
        "200":
          description: Updated area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Area"

  /areas/{id}/tasks:
    get:
      operationId: listAreaTasks
      tags: [areas]
      summary: List all tasks for an area (any date, any status)
      description: |
        Brain-dump view: returns every regular task belonging to a given
        area regardless of date, ordered newest-first. Excludes module-
        sourced tasks (e.g. 'home' microtasks). Use this for the per-area
        page; use /tasks for the daily/today view.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks for this area
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "404":
          description: Area not found

  /milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones for a area
      parameters:
        - name: areaId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create a milestone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneBody"
      responses:
        "201":
          description: Created milestone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /milestones/bulk:
    post:
      operationId: bulkCreateMilestones
      tags: [milestones]
      summary: Create multiple milestones at once for a area
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateMilestonesBody"
      responses:
        "201":
          description: Created milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"

  /milestones/{id}:
    patch:
      operationId: updateMilestone
      tags: [milestones]
      summary: Update a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMilestoneBody"
      responses:
        "200":
          description: Updated milestone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
    delete:
      operationId: deleteMilestone
      tags: [milestones]
      summary: Delete a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /milestones/{id}/breakdown:
    post:
      operationId: breakdownMilestone
      tags: [milestones]
      summary: Ask AI to break a goal into 5–8 ordered steps
      description: |
        Phase 3 chief-of-staff move. Takes the milestone ("goal") title plus
        the user's area context, asks the LLM for an ordered plan, and
        creates 5–8 task rows linked to this milestone with sortOrder 1..N
        and date = today. Returns the created tasks. If OPENAI_API_KEY is
        unset, a deterministic fallback plan is returned so the UI never
        sees a hard error.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created step tasks (in order)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "404":
          description: Milestone not found
        "409":
          description: Goal already has steps — ask the user to clear them first

  /milestones/{id}/steps/bulk:
    post:
      operationId: bulkCreateMilestoneSteps
      tags: [milestones]
      summary: Append many steps to a goal at once
      description: |
        Creates one task per title under the given milestone, appended after
        any existing steps. New tasks land in array order, with sortOrder
        continuing from the highest existing sortOrder for the milestone.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateMilestoneStepsBody"
      responses:
        "201":
          description: Created step tasks (in order)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "400":
          description: Empty titles array, or one or more titles exceed the length limit
        "404":
          description: Milestone not found

  /milestones/{id}/step-order:
    patch:
      operationId: reorderMilestoneSteps
      tags: [milestones]
      summary: Reorder the steps inside a goal
      description: |
        Body is an ordered array of task ids. Each task is updated so its
        sortOrder matches its index in the array. Tasks that don't belong
        to this milestone are silently ignored.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                taskIds:
                  type: array
                  items:
                    type: integer
              required:
                - taskIds
      responses:
        "200":
          description: Reordered tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "404":
          description: Milestone not found

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List daily tasks
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: Date in YYYY-MM-DD format, defaults to today
        - name: source
          in: query
          required: false
          schema:
            type: string
            description: Filter by taskSource (e.g. 'home'). Omit to get all tasks.
      responses:
        "200":
          description: List of daily tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a daily task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task (status, content)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/suggestions:
    get:
      operationId: getTaskSuggestions
      tags: [tasks]
      summary: Get suggested tasks for a given date based on active areas and milestones
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: Date in YYYY-MM-DD format, defaults to today
      responses:
        "200":
          description: List of task suggestions (empty if no slots available)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSuggestion"

  /tasks/{id}/step-back:
    post:
      operationId: stepBackTask
      tags: [tasks]
      summary: Create a prerequisite task one level simpler and mark original as stepped back
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Prerequisite task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepBackTaskResponse"
        "400":
          description: Cannot step back (max depth reached or invalid task state)
        "404":
          description: Task not found

  /weekly:
    get:
      operationId: listWeeklyPlans
      tags: [weekly]
      summary: List weekly plans
      parameters:
        - name: weekOf
          in: query
          required: false
          schema:
            type: string
            description: Week start date YYYY-MM-DD, defaults to current week
      responses:
        "200":
          description: List of weekly plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyPlan"
    post:
      operationId: createWeeklyPlan
      tags: [weekly]
      summary: Create a weekly plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeeklyPlanBody"
      responses:
        "201":
          description: Created weekly plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"

  /weekly/{id}:
    patch:
      operationId: updateWeeklyPlan
      tags: [weekly]
      summary: Update a weekly plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWeeklyPlanBody"
      responses:
        "200":
          description: Updated weekly plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"

  /progress:
    get:
      operationId: listProgressLogs
      tags: [progress]
      summary: List progress log entries
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: List of progress log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressLog"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get today's dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/week-summary:
    get:
      operationId: getWeekSummary
      tags: [dashboard]
      summary: Get this week's task completion summary
      responses:
        "200":
          description: Weekly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekSummary"

  /dashboard/reentry:
    get:
      operationId: getReentryTask
      tags: [dashboard]
      summary: Get re-entry task (last unfinished or last completed)
      responses:
        "200":
          description: Re-entry task or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReentryInfo"

  /dashboard/briefing:
    get:
      operationId: getBriefing
      tags: [dashboard]
      summary: Get the chief-of-staff briefing narrative for today
      responses:
        "200":
          description: Briefing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Briefing"

  /dashboard/area-health:
    get:
      operationId: getAreaHealth
      tags: [dashboard]
      summary: Get per-area health stats for this week
      responses:
        "200":
          description: Area health with portfolio balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaHealthResponse"

  /dashboard/outcome-metrics:
    get:
      operationId: getOutcomeMetrics
      tags: [dashboard]
      summary: Get outcome metrics (milestone and task completion rates)
      parameters:
        - name: weekOf
          in: query
          required: false
          schema:
            type: string
          description: Week start date in YYYY-MM-DD format (Monday). Defaults to the current week.
      responses:
        "200":
          description: Outcome metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeMetrics"

  /dashboard/area-completion-history:
    get:
      operationId: getAreaCompletionHistory
      tags: [dashboard]
      summary: Get per-area completion rates for the last N weeks
      parameters:
        - name: weeks
          in: query
          required: false
          schema:
            type: integer
            default: 4
          description: Number of past weeks to include (default 4)
      responses:
        "200":
          description: Area completion history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaCompletionHistory"

  /dashboard/friction:
    get:
      operationId: getFrictionSignals
      tags: [dashboard]
      summary: Get detected friction signals across areas, tasks, and milestones
      responses:
        "200":
          description: List of friction signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FrictionSignal"

  /monthly:
    get:
      operationId: listMonthlyReviews
      tags: [monthly]
      summary: List monthly reviews, newest first
      responses:
        "200":
          description: List of monthly reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyReview"
    post:
      operationId: createMonthlyReview
      tags: [monthly]
      summary: Create a monthly review (409 if monthOf already exists)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonthlyReviewBody"
      responses:
        "201":
          description: Created monthly review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReview"
        "409":
          description: A review for this month already exists

  /monthly/{id}:
    patch:
      operationId: updateMonthlyReview
      tags: [monthly]
      summary: Update a monthly review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonthlyReviewBody"
      responses:
        "200":
          description: Updated monthly review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReview"
        "404":
          description: Monthly review not found

  /daily:
    get:
      operationId: listDailyPlans
      tags: [daily]
      summary: List daily plans
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: Date in YYYY-MM-DD format. When omitted, returns all plans newest first.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            description: Maximum number of plans to return when no date filter is applied
      responses:
        "200":
          description: List of daily plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyPlan"
    post:
      operationId: createDailyPlan
      tags: [daily]
      summary: Create a daily plan (409 if date already has a plan)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyPlanBody"
      responses:
        "201":
          description: Created daily plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlan"
        "409":
          description: A plan for this date already exists

  /daily/{id}:
    patch:
      operationId: updateDailyPlan
      tags: [daily]
      summary: Update a daily plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDailyPlanBody"
      responses:
        "200":
          description: Updated daily plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlan"
        "404":
          description: Daily plan not found

  /reflections/weekly/draft:
    post:
      operationId: draftWeeklyReflection
      tags: [reflections]
      summary: Draft a weekly reflection from the user's current data
      description: |
        Returns a chief-of-staff style draft of the four reflection fields
        (Moved / Stuck / Drop / Next focus) so the user only has to edit, not
        write from scratch. The draft is NOT persisted — it is the user's
        responsibility to save the reflection. Cached for 60 minutes per
        (user, week) unless `bypassCache: true` is set (Regenerate).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftReflectionBody"
      responses:
        "200":
          description: Drafted reflection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReflectionDraft"

  /reflections/monthly/draft:
    post:
      operationId: draftMonthlyReflection
      tags: [reflections]
      summary: Draft a monthly reflection from the user's current data
      description: |
        Returns a chief-of-staff style draft of the four reflection fields
        for the past month. Same shape and semantics as the weekly draft.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftReflectionBody"
      responses:
        "200":
          description: Drafted reflection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReflectionDraft"

components:
  schemas:
    TaskSuggestion:
      type: object
      properties:
        title:
          type: string
        areaId:
          type: integer
        areaName:
          type: string
        areaColor:
          type: string
          nullable: true
        areaCategory:
          type: string
          nullable: true
          enum: [business, creative, wellness]
          description: Task category derived from the area's category setting
        milestoneId:
          type: integer
        milestoneTitle:
          type: string
      required:
        - title
        - areaId
        - areaName
        - milestoneId
        - milestoneTitle

    Milestone:
      type: object
      properties:
        id:
          type: integer
        areaId:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [planned, active, blocked, complete]
        priority:
          type: string
          nullable: true
          enum: [P1, P2, P3, P4]
        targetDate:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        nextAction:
          type: string
          nullable: true
        sortOrder:
          type: integer
        mode:
          type: string
          enum: [ordered, any]
          description: |
            Phase 3 "goal" mode. "ordered" means only the lowest-sortOrder
            pending sub-task is eligible for the daily briefing. "any"
            means any open sub-task can be picked.
        completedAt:
          type: string
          nullable: true
          description: |
            ISO timestamp when this goal was marked complete. Null while
            open. Set independently of step status — a goal can be closed
            with steps still pending, or stay open with all steps done.
        holdUntilMilestoneId:
          type: integer
          nullable: true
          description: |
            Phase-dependency pointer. When set, this goal is held until the
            referenced milestone has its completedAt timestamp set. Must
            point at another milestone in the same area. Null means no hold.
        isOnHold:
          type: boolean
          description: |
            Read-only. True when holdUntilMilestoneId is set and the
            referenced milestone has not been completed. Recomputed on every
            read; never stored.
        createdAt:
          type: string
      required:
        - id
        - areaId
        - title
        - status
        - sortOrder
        - mode
        - isOnHold
        - createdAt

    CreateMilestoneBody:
      type: object
      properties:
        areaId:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [planned, active, blocked, complete]
        priority:
          type: string
          nullable: true
          enum: [P1, P2, P3, P4]
        targetDate:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        nextAction:
          type: string
          nullable: true
        sortOrder:
          type: integer
        mode:
          type: string
          enum: [ordered, any]
        completedAt:
          type: string
          nullable: true
        holdUntilMilestoneId:
          type: integer
          nullable: true
      required:
        - areaId
        - title

    BulkCreateMilestonesBody:
      type: object
      properties:
        areaId:
          type: integer
        titles:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
          maxItems: 50
      required:
        - areaId
        - titles

    BulkCreateMilestoneStepsBody:
      type: object
      properties:
        titles:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 280
          minItems: 1
          maxItems: 100
      required:
        - titles

    UpdateMilestoneBody:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
          enum: [planned, active, blocked, complete]
        priority:
          type: string
          nullable: true
          enum: [P1, P2, P3, P4]
        targetDate:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        nextAction:
          type: string
          nullable: true
        sortOrder:
          type: integer
        mode:
          type: string
          enum: [ordered, any]
        completedAt:
          type: string
          nullable: true
        holdUntilMilestoneId:
          type: integer
          nullable: true

    Briefing:
      type: object
      properties:
        narrative:
          type: string
          description: Short paragraph the chief-of-staff card displays
        source:
          type: string
          enum: [llm, fallback]
          description: Which renderer produced this narrative
      required:
        - narrative
        - source

    AreaHealthEntry:
      type: object
      properties:
        areaId:
          type: integer
        areaName:
          type: string
        portfolioStatus:
          type: string
          nullable: true
        tasksDoneThisWeek:
          type: integer
        tasksPushedOrPassedThisWeek:
          type: integer
        daysSinceLastMovement:
          type: integer
          nullable: true
        nudge:
          type: string
          nullable: true
        warning:
          type: string
          nullable: true
        portfolioSharePercent:
          type: number
          nullable: true
          description: Percentage of this week's done tasks attributable to this area
      required:
        - areaId
        - areaName
        - tasksDoneThisWeek
