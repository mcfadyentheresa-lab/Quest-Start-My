# Custom Nixpacks config for this pnpm workspace monorepo.
#
# Root cause of the previous deploy failures:
# Nixpacks' default Node/pnpm provider only stages `package.json` +
# `pnpm-lock.yaml` into the install layer for caching. It does NOT copy
# `pnpm-workspace.yaml` or the per-workspace `package.json` files. When
# `pnpm install` ran without those files visible, pnpm fell back to a plain
# (non-workspace) install at the repo root and only installed the two root
# devDependencies (typescript, prettier) — finishing in ~500ms. Workspace
# packages like `artifacts/quest-start-my-day` (which owns `vite`) were
# never installed, so the build phase failed with `sh: 1: vite: not found`.
#
# Fix: tell Nixpacks to copy the whole repo before the install phase runs
# (`paths = ["."]`) so pnpm sees `pnpm-workspace.yaml` and every workspace
# `package.json`, then install the entire workspace in one go.

[phases.setup]
nixPkgs = ["nodejs_24", "pnpm-9_x"]

[phases.install]
# Copy the full repo into the install layer before running install. Without
# this, Nixpacks only stages the root package.json + lockfile and pnpm
# installs only root devDeps (no vite, no workspace packages).
paths = ["."]
cmds = [
  "npm install -g corepack@0.31.0",
  "corepack enable",
  # NODE_ENV=development forces pnpm to install devDependencies even when
  # Railway sets NODE_ENV=production in the build environment. vite and
  # the other build-time tools live in devDependencies.
  "NODE_ENV=development pnpm install --frozen-lockfile",
]

[phases.build]
# PORT=8080 is a dummy value for the Vite build — it's required by the
# frontend's vite.config.ts but only used at runtime (Railway sets the real
# PORT when the server starts).
#
# The `deploy` script runs the pillars→areas rename (idempotent) BEFORE
# `drizzle-kit push` so push doesn't see an unexpected `pillars` table and
# either fail or attempt a destructive drop+create. This was the root cause
# of every /api/areas, /api/tasks, /api/dashboard/* 500 in production: the
# rename had never landed, so the schema and the runtime queries were
# permanently out of sync.
cmds = [
  "PORT=8080 BASE_PATH=${BASE_PATH:-/} pnpm run build",
  "pnpm --filter @workspace/db run deploy",
]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
